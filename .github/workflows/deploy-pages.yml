# Despliega la exportación estática (carpeta out/) a GitHub Pages.
# Dominio: thelastinalfu.com (raíz del sitio, sin subruta /repo).
# Si en el futuro publicaras solo en https://usuario.github.io/nombre-repo/,
# añade en el build: NEXT_PUBLIC_SITE_BASE_PATH: nombre-repo (sin slashes).
name: Deploy static site to Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build static export
        env:
          NEXT_PUBLIC_SITE_URL: https://thelastinalfu.com
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
